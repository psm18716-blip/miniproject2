<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{{ manufacturer }} - CarMarket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar navbar-light bg-white border-bottom px-4">
        <a href="/" class="navbar-brand fw-bold fs-4 text-decoration-none">🚗 CarMarket</a>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">

            <!-- 왼쪽 필터 사이드바 -->
            <div class="col-2 border-end pe-4">
                <form method="GET" action="/list">
                    <input type="hidden" name="manufacturer" value="{{ manufacturer }}">

                    <h6 class="fw-bold mb-3">연식</h6>
                    <div class="d-flex gap-2 mb-4">
                        <input type="number" name="year_min" class="form-control form-control-sm" placeholder="최소" value="{{ year_min }}">
                        <input type="number" name="year_max" class="form-control form-control-sm" placeholder="최대" value="{{ year_max }}">
                    </div>

                    <h6 class="fw-bold mb-3">가격 (만원)</h6>
                    <div class="d-flex gap-2 mb-4">
                        <input type="number" name="price_min" class="form-control form-control-sm" placeholder="최소" value="{{ price_min }}">
                        <input type="number" name="price_max" class="form-control form-control-sm" placeholder="최대" value="{{ price_max }}">
                    </div>

                    <h6 class="fw-bold mb-3">연료</h6>
                    <div class="mb-4">
                        {% for fuel in ['가솔린', '디젤', '전기', 'LPG(일반인 구입)', '가솔린+전기'] %}
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="fuel_type"
                                   value="{{ fuel }}" id="fuel_{{ loop.index }}"
                                   {{ 'checked' if fuel_type == fuel }}>
                            <label class="form-check-label" for="fuel_{{ loop.index }}">{{ fuel }}</label>
                        </div>
                        {% endfor %}
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="fuel_type"
                                   value="" {{ 'checked' if not fuel_type }}>
                            <label class="form-check-label">전체</label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-dark w-100">검색</button>
                    <a href="/list?manufacturer={{ manufacturer }}" class="btn btn-outline-secondary w-100 mt-2">초기화</a>
                </form>
            </div>

            <!-- 오른쪽 매물 목록 -->
            <div class="col-10 ps-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold mb-0">{{ manufacturer }} <span class="text-muted fs-6">총 {{ "{:,}".format(total) }}대</span></h5>
                </div>
