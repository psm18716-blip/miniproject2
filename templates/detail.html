<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{{ car.model }} - CarMarket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar navbar-light bg-white border-bottom px-4">
        <a href="/" class="navbar-brand fw-bold fs-4 text-decoration-none">🚗 CarMarket</a>
    </nav>

    <div class="container mt-4">
        <div class="row g-4">

            <!-- 왼쪽: 사진 + 기본 정보 -->
            <div class="col-6">
                {% if car.photo_url %}
                <img src="{{ car.photo_url }}" class="w-100 rounded-3" style="height:320px; object-fit:cover;">
                {% endif %}

                <div class="card mt-3 p-4">
                    <h5 class="fw-bold">{{ car.model }}</h5>
                    <p class="text-muted mb-3">{{ car.badge }}</p>
                    <h4 class="text-primary fw-bold mb-4">{{ "{:,}".format(car.price) }}만원</h4>

                    <table class="table table-borderless">
                        <tr><td class="text-muted">연식</td><td class="fw-bold">{{ car.year }}년</td></tr>
                        <tr><td class="text-muted">주행거리</td><td class="fw-bold">{{ "{:,}".format(car.mileage) }}km</td></tr>
                        <tr><td class="text-muted">연료</td><td class="fw-bold">{{ car.fuel_type }}</td></tr>
                        <tr><td class="text-muted">지역</td><td class="fw-bold">{{ car.region }}</td></tr>
                        <tr><td class="text-muted">국산/수입</td><td class="fw-bold">{{ car.car_type }}</td></tr>
                    </table>

                    <a href="https://www.encar.com/md/car/index.do?carid={{ car.id }}"
                       target="_blank" class="btn btn-dark w-100 mt-2">
                        엔카에서 보기 →
                    </a>
                </div>
            </div>

            <!-- 오른쪽: 시세 차트 -->
            <div class="col-6">
                <div class="card p-4 h-100">
                    <h6 class="fw-bold mb-3">📊 {{ car.model }} 연식별 평균 시세</h6>
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const labels = {{ chart_data | map(attribute='year') | list | tojson }};
        const data = {{ chart_data | map(attribute='avg_price') | list | tojson }};

        new Chart(document.getElementById('priceChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '평균 시세 (만원)',
                    data: data,
                    borderColor: '#1a6ef5',
                    backgroundColor: 'rgba(26,110,245,0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: false }
                }
            }
        });
    </script>

</body>
</html>
