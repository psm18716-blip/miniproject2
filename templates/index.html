<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>중고차 시세 분석</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- 네비게이션 바 -->
    <nav class="navbar navbar-light bg-white border-bottom px-4">
        <span class="navbar-brand fw-bold fs-4">🚗 CarMarket</span>
        <div>
            <a href="/?car_type=전체" class="btn btn-sm btn-outline-secondary me-1">전체</a>
            <a href="/?car_type=국산" class="btn btn-sm btn-outline-secondary me-1">국산</a>
            <a href="/?car_type=수입" class="btn btn-sm btn-outline-secondary">수입</a>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">

            <!-- 왼쪽 브랜드 필터 -->
            <div class="col-2 border-end">
                <h6 class="fw-bold mb-3">브랜드 · 모델</h6>
                {% for brand in brands %}
                <div class="d-flex justify-content-between py-1">
                    <a href="/list?manufacturer={{ brand.manufacturer }}" class="text-decoration-none text-dark">
                        {{ brand.manufacturer }}
                    </a>
                    <span class="text-primary">{{ brand.count }}</span>
                </div>
                {% endfor %}
            </div>

            <!-- 오른쪽 메인 영역 -->
            <div class="col-10">
                <h5 class="fw-bold mb-4">인기 브랜드</h5>
                <div class="row row-cols-4 g-3">
                    {% for brand in brands[:8] %}
                    <div class="col">
                        <a href="/list?manufacturer={{ brand.manufacturer }}" class="text-decoration-none">
                            <div class="card text-center p-3 h-100">
                                <div class="fw-bold">{{ brand.manufacturer }}</div>
                                <div class="text-primary">{{ brand.count }}대</div>
                            </div>
                        </a>
                    </div>
                    {% endfor %}
                </div>
            </div>

        </div>
    </div>

</body>
</html>
